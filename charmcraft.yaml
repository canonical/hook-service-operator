name: hook-service
type: charm
title: Hook Service Operator
summary: Operator for Identity platform Hook Service
description: |
    Operator for Identity platform Hook Service
links:
  source: https://github.com/canonical/hook-service-operator
  issues: https://github.com/canonical/hook-service-operator/issues

charm-user: non-root
platforms:
  ubuntu@22.04:amd64:

assumes:
  - juju >= 3.0.2
  - k8s-api

config:
  options:
    http_proxy:
      description: URL of the HTTP proxy eg http://proxy.internal:6666, it will set the HTTP_PROXY var in the workload environment
      type: string
      default: ''
    https_proxy:
      description: URL of the HTTPS proxy eg http://proxy.internal:6666, it will set the HTTPS_PROXY var in the workload environment
      type: string
      default: ''
    no_proxy:
      description: Domains that need to be excluded from proxying no_proxy="test.com,test.co.uk", it is a comma separate list
      type: string
      default: ''
    log_level:
      description: |
        Configures the log level.

        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "info"
      type: string
    cpu:
      description: |
        K8s cpu resource limit, e.g. "1" or "500m". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string
    memory:
      description: |
        K8s memory resource limit, e.g. "1Gi". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string
    authorization_enabled:
      description: |
        Whether the access control authorization integration is enabled.
      type: boolean
      default: true
    authn_allowed_subjects:
      description: |
        Comma separated list of allowed subject IDs that are allowed to access the Group/Authz management APIs.
      type: string
      default: ''
    authn_allowed_scope:
      description: |
        The allowed OAuth2 scopes that are allowed to access the Group/Authz management APIs.
      type: string
      default: ''
    authn_issuer:
      description: |
        The expected issuer of incoming tokens to the Group/Authz management APIs.

        This configuration cannot be used with when the oauth integration exists.
      type: string
      default: ''
    authn_jwks_url:
      description: |
        The URL to fetch JWKS keys for validating incoming tokens to the Group/Authz management APIs.

        This configuration cannot be used with when the oauth integration exists.
      type: string
      default: ''
    use_ingress_for_relations:
      description: |
        Use ingress URL for relation endpoints. When true, the internal-route ingress URL is passed
        to in-cluster relations like Hydra. When false, the local Kubernetes service URL is preferred.
      type: boolean
      default: false

actions:
  get-access-token:
    description: |
      Generate a JWT token for accessing the Group/Authz management APIs.

      This action requires the oauth integration to be established and ready.
  create-group:
    description: |
      Create a new group via the hook-service API.

      Returns the ID of the newly created group.
    params:
      name:
        type: string
        description: Group name.
      description:
        type: string
        description: Group description.
        default: ""
      type:
        type: string
        description: Group type (e.g. "local").
        default: local
    required:
      - name
  delete-group:
    description: |
      Delete a group via the hook-service API.
    params:
      group-id:
        type: string
        description: The ID of the group to delete.
    required:
      - group-id
  list-groups:
    description: |
      List all groups via the hook-service API.

      Returns a JSON array of group objects including their IDs, names, and descriptions.
  import-groups:
    description: |
      Batch imports user group mappings into the database.

      When sync=true, the database is reconciled with the driver data: stale groups
      and memberships that no longer exist in the driver are removed. If the openfga
      integration is configured, authorization tuples for deleted groups are also
      cleaned up automatically.
    params:
      driver:
        type: string
        description: Import driver (e.g. salesforce)
        default: salesforce
      domain:
        type: string
        description: The API domain, e.g. for Salesforce.
      consumer-secret:
        type: string
        description: Secret ID containing `consumer-key` and `consumer-secret` keys.
      sync:
        type: boolean
        description: |
          Reconcile the database with the driver data, removing stale groups and memberships.
          Only groups with the driver's prefix (e.g. `salesforce:`) are affected; local/admin-created
          groups are never touched.
        default: false
  users-delete:
    description: |
      Remove a user from all groups.

      This operation is idempotent and succeeds even if the user has no group memberships.
      The user is identified by their email address.
    params:
      user-id:
        type: string
        description: The user ID (email address) to remove from all groups.
    required:
      - user-id
  users-list-groups:
    description: |
      List all groups a user belongs to.

      Returns a JSON array of group objects for the specified user.
    params:
      user-id:
        type: string
        description: The user ID (email address) to list groups for.
    required:
      - user-id
  users-set-groups:
    description: |
      Replace a user's group memberships.

      Sets the user's group memberships to exactly the provided list,
      removing any previous memberships not included.
    params:
      user-id:
        type: string
        description: The user ID (email address) whose memberships to replace.
      groups:
        type: string
        description: Comma-separated list of group IDs to assign to the user.
    required:
      - user-id
      - groups
  groups-add-users:
    description: |
      Add one or more users to a group.

      This operation is idempotent; adding a user already in the group succeeds without error.
    params:
      group-id:
        type: string
        description: The group ID to add users to.
      users:
        type: string
        description: Comma-separated list of user IDs (email addresses) to add.
    required:
      - group-id
      - users
  groups-remove-users:
    description: |
      Remove one or more users from a group.

      This operation is idempotent; removing a user not in the group succeeds without error.
    params:
      group-id:
        type: string
        description: The group ID to remove users from.
      users:
        type: string
        description: Comma-separated list of user IDs (email addresses) to remove.
    required:
      - group-id
      - users
  groups-list-users:
    description: |
      List all users in a group.

      Returns a JSON array of user IDs for the specified group.
    params:
      group-id:
        type: string
        description: The group ID to list users for.
    required:
      - group-id

requires:
  logging:
    interface: loki_push_api
    optional: true
  tracing:
    interface: tracing
    limit: 1
    optional: true
    description: |
      Provides traces to COS Tempo instance
  internal-route:
    interface: traefik_route
    limit: 1
    optional: true
    description: |
      Allows the charm to be exposed for cross-cluster communication, needed
      for cases where network topology is more complex than just one k8s cluster
  pg-database:
    interface: postgresql_client
    optional: false
    limit: 1
  openfga:
    interface: openfga
    limit: 1
    optional: true
    description: |
      Receive OpenFGA server's url and store information.
  oauth:
    interface: oauth
    limit: 1
    description: |
      Receive oauth server's info and a set of client credentials.
      This integration can be used to integrate the service with an OAuth2/OIDC Provider.
  receive-ca-cert:
    interface: certificate_transfer
    description: |
      Receive a CA cert.
      This relation can be used with a local CA to obtain the CA cert that was used to sign proxied
      endpoints.
  tenant-service-info:
    interface: tenant_service_info
    limit: 1
    optional: true
    description: |
      Receive the tenant-service HTTP and gRPC URLs.
      When established, hook-service validates tenant membership during token enrichment.

provides:
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: |
      Provides application metrics to COS Prometheus instance
  grafana-dashboard:
    interface: grafana_dashboard
    optional: true
    description: |
      Forwards the built-in grafana dashboard(s) for monitoring hydra.
  hydra-token-hook:
    interface: hydra_token_hook
    optional: true
    description: Used to configure the hydra token hook

peers:
  hook-service:
    interface: hook_service_peers

containers:
  hook-service:
    gid: 584792
    uid: 584792
    resource: oci-image

resources:
  oci-image:
    type: oci-image
    description: OCI image for hook-service
    upstream-source: ghcr.io/canonical/hook-service:v1.3.1

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - "rustc-1.85"
      - "cargo-1.85"
  templates:
    plugin: dump
    source: .
    prime:
      - templates/
